base_model: "Qwen/Qwen2.5-3B"   # chosen by fertility: Az/En ratio 3.24x vs Phi-3 3.36x, Falcon 4.24x

bnb:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "checkpoints/"
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 50
  save_steps: 50
  bf16: true
  max_seq_length: 1024
  packing: true
  seed: 42
  dataloader_num_workers: 4
  report_to: "none"

paths:
  train_jsonl: "data/processed/train.jsonl"
  val_jsonl:   "data/processed/val.jsonl"
  adapter_out: "adapters/az-instruct-lora"
